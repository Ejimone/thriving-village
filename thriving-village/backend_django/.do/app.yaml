name: thriving-village-backend
region: nyc
services:
  - name: django-api
    github:
      repo: Ejimone/thriving-village
      branch: main
      deploy_on_push: true
    source_dir: thriving-village/backend_django
    dockerfile_path: Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/jobs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: .ondigitalocean.app
      - key: DJANGO_SECRET_KEY
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: DATABASE_URL
        type: SECRET
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: REPLACE_WITH_YOUR_FRONTEND_ORIGIN
      - key: UPSTASH_REDIS_URL
        type: SECRET
      - key: CLOUDINARY_CLOUD_NAME
        type: SECRET
      - key: CLOUDINARY_API_KEY
        type: SECRET
      - key: CLOUDINARY_API_SECRET
        type: SECRET
      - key: MUX_TOKEN_ID
        type: SECRET
      - key: MUX_TOKEN_TOKEN_SECRET
        type: SECRET
      - key: MUX_KEY_ID
        type: SECRET
      - key: MUX_SIGNING_SECRET_KEY
        type: SECRET
      - key: MUX_WEBHOOK_SECRET
        type: SECRET
      - key: ACADEMY_FRONTEND_ORIGIN
        value: REPLACE_WITH_YOUR_FRONTEND_ORIGIN
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: Ejimone/thriving-village
      branch: main
    source_dir: thriving-village/backend_django
    dockerfile_path: Dockerfile
    instance_size_slug: basic-xxs
    run_command: python manage.py migrate --noinput
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: .ondigitalocean.app
      - key: DJANGO_SECRET_KEY
        type: SECRET
      - key: JWT_SECRET
        type: SECRET
      - key: DATABASE_URL
        type: SECRET
      - key: DATABASE_SSL
        value: "true"
